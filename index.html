<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Devakrishnan M J - Mechanical Engineer & Web Developer. Explore my featured projects and technical skills.">
    <title>Devakrishnan M J | Home</title>
    <style>
        /* Base Global & Reset Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #fcfcfc;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover, button:hover {
            opacity: 0.85;
        }
        a:focus, button:focus, input:focus, select:focus, textarea:focus {
            outline: 3px solid #ff9900;
            outline-offset: 2px;
        }

        /* Accessibility Skip Link */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 0;
            background: #ff9900;
            color: #000;
            padding: 10px;
            z-index: 1000;
        }
        .skip-link:focus {
            top: 0;
        }

        /* Header & Sticky Navigation */
        header {
            position: sticky;
            top: 0;
            background-color: #1a1a1a;
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }
        .logo {
            color: #ffffff;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .nav-links {
            display: flex;
            list-style: none;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 500;
        }
        .nav-links a.active {
            background-color: #0066cc;
            color: #ffffff;
        }

        /* Hero Section */
        .hero {
            min-height: 60vh;
            background-color: #e6f2ff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }
        .hero-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .hero h1 {
            font-size: 5vw;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 2.5vw;
            color: #555555;
            max-width: 600px;
        }

        /* Main Content & Layout Containers */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            position: relative;
            padding-bottom: 10px;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: #0066cc;
            border-radius: 2px;
        }

        /* Featured Projects (Flexbox Cards) */
        .featured-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .project-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            width: 100%;
            max-width: 340px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .project-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .project-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .project-info h3 {
            margin-bottom: 10px;
            font-size: 1.25rem;
        }
        .project-info p {
            font-size: 0.95rem;
            color: #666666;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .cta-btn {
            display: inline-block;
            background-color: #0066cc;
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }

        /* Fixed Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 35px;
            right: 35px;
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 1000;
            border: none;
            cursor: pointer;
        }

        /* Footer Element */
        footer {
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
